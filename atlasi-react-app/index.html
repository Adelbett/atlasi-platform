<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مظلات الأطلسي | حلول تظليل فاخرة</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Cairo+Play:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#735b25",
            "primary-container": "#b89b5e",
            "on-primary": "#ffffff",
            "secondary": "#5f5e5e",
            "background": "#fcf9f8",
            "surface": "#fcf9f8",
            "on-surface": "#1c1b1b",
            "outline": "#7e7668",
            "outline-variant": "#d0c5b5",
            "surface-container-low": "#f6f3f2",
            "surface-container-lowest": "#ffffff",
            "gold-accent": "#B89B5E"
          },
          "borderRadius": {
            "DEFAULT": "0.5rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Cairo Play", "Cairo", "sans-serif"],
            "body": ["Cairo", "sans-serif"],
            "label": ["Cairo", "sans-serif"]
          }
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
